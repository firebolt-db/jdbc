name: Run integration tests v2

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'The docker image tag for the firebolt core'
        required: false
        type: string
        default: 'v4.19.3_x86'
      java_version:
        description: 'JRE version'
        required: false
        type: string
        default: '11'
      os_name:
        description: 'The operating system'
        required: false
        type: string
        default: 'ubuntu-latest'
  workflow_call:
    inputs:
      tag_version:
        description: 'The docker image tag for the firebolt core'
        required: false
        type: string
        default: 'v4.19.3_x86'
      os_name:
        description: 'Operating system'
        required: false
        type: string
        default: 'ubuntu-latest'
      java_version:
        description: 'Java'
        required: false
        type: string
        default: '11'

jobs:
  run-core-integration-tests:
    runs-on: ${{ inputs.os_name }}
    steps:
      # need to use the docker-compose and config json from the checked out code
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ inputs.java_version }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare docker-compose.yml with image version and base directory
        run: |
          sed -i "s|\${IMAGE_TAG}|${{ inputs.tag_version }}|g" docker-compose.yml
          workspace="${{ github.workspace }}"
          sed -i "s|\${BASE_DIR}|$workspace|g" docker-compose.yml

      - name: Start service container
        run: |
          docker compose up

      # we start the docker compose on port 3473
      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl --silent http://localhost:3473 --data-binary "SELECT 1" | grep -q "1"; then
              echo "Service is up!";
              break;
            fi
            echo "Waiting for service... ($i)";
            sleep 2
          done

      - name: Grant execute permission (Unix)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest -DexcludeTags="v1,v2,slow"

      - name: Stop container
        if: always()
        run: docker stop test-service && docker rm test-service